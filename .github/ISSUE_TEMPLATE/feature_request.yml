name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for OpenShot? We'd love to hear it. Please describe the feature you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: "I often need to capture a specific region repeatedly, but..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you envision this working?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered other approaches? What are they?

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Capture
        - Recording
        - Annotation
        - OCR
        - UI / UX
        - Settings
        - Export / Formats
        - Automation / URL Scheme
        - Performance
        - Accessibility
        - Other
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Mockups or references
      description: Any mockups, screenshots from other tools, or design references.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a PR for this feature
