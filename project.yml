name: OpenShot
options:
  bundleIdPrefix: com.openshot
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_OPTIMIZATION_LEVEL: -O

targets:
  OpenShot:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: OpenShot
        excludes:
          - "Resources/Assets.xcassets/AppIcon.appiconset"
          - "Resources/Assets.xcassets/MenuBarIcon.imageset"
    resources:
      - path: OpenShot/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openshot.app
        INFOPLIST_FILE: OpenShot/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenShot/Resources/OpenShot.entitlements
        PRODUCT_NAME: OpenShot
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: false
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: true
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    entitlements:
      path: OpenShot/Resources/OpenShot.entitlements

  OpenShotTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: OpenShotTests
    dependencies:
      - target: OpenShot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openshot.app.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OpenShot.app/Contents/MacOS/OpenShot"
        GENERATE_INFOPLIST_FILE: "YES"
